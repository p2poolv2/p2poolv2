---
# Nginx reverse proxy for P2Poolv2
#
# Deploys a single nginx config covering the p2poolv2 site,
# redirect domains, and optionally grafana.

- name: Install nginx
  ansible.builtin.apt:
    name: nginx
    state: present
    update_cache: true

- name: Install certbot and nginx plugin
  ansible.builtin.apt:
    name:
      - certbot
      - python3-certbot-nginx
    state: present

- name: Deploy nginx site config
  ansible.builtin.template:
    src: p2poolv2_site.conf.j2
    dest: /etc/nginx/sites-available/p2poolv2.conf
    owner: root
    group: root
    mode: "0644"
  notify: reload nginx

- name: Enable nginx site
  ansible.builtin.file:
    src: /etc/nginx/sites-available/p2poolv2.conf
    dest: /etc/nginx/sites-enabled/p2poolv2.conf
    state: link
  notify: reload nginx

- name: Remove old nginx site configs
  ansible.builtin.file:
    path: "/etc/nginx/sites-enabled/{{ item }}"
    state: absent
  loop:
    - default
    - testnet4.conf
  notify: reload nginx

- name: Obtain Let's Encrypt certificate for {{ p2poolv2_domain }}
  ansible.builtin.command:
    cmd: >
      certbot certonly --nginx
      --non-interactive
      --agree-tos
      --email {{ p2poolv2_certbot_email }}
      -d {{ p2poolv2_domain }}
      {% for d in p2poolv2_redirect_domains %}-d {{ d }} {% endfor %}
    creates: "/etc/letsencrypt/live/{{ p2poolv2_domain }}/fullchain.pem"
  when: p2poolv2_certbot_email | length > 0
  notify: reload nginx

- name: Obtain Let's Encrypt certificate for grafana
  ansible.builtin.command:
    cmd: >
      certbot certonly --nginx
      --non-interactive
      --agree-tos
      --email {{ p2poolv2_certbot_email }}
      -d {{ p2poolv2_grafana_domain }}
    creates: "/etc/letsencrypt/live/{{ p2poolv2_grafana_domain }}/fullchain.pem"
  when: p2poolv2_grafana_domain is defined and p2poolv2_certbot_email | length > 0
  notify: reload nginx

- name: Enable and start nginx
  ansible.builtin.systemd:
    name: nginx
    enabled: true
    state: started
