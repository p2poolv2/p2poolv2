[format.rules]
indent-table-key-value-pairs = false

[lint.rules]
tables-out-of-order = "warn"

[lsp]
# https://github.com/tombi-toml/tombi/issues/1556
goto-type-definition.enabled = false

[[schemas]]
path = "tombi://www.schemastore.org/cargo.json"
include = ["Cargo.toml"]
format.rules.array-values-order.enabled = false
format.rules.table-keys-order.enabled = false
