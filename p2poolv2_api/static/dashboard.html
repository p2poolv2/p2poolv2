<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>P2Poolv2 Dashboard</title>
  <link rel="stylesheet" href="/static/pico.min.css">
  <script defer src="/static/alpine.min.js"></script>
</head>
<body>
  <main class="container" x-data="dashboard()">

    <!-- Login dialog -->
    <template x-if="!authenticated">
      <article>
        <header>
          <h2>P2Poolv2 - Login</h2>
        </header>
        <form @submit.prevent="login">
          <template x-if="error">
            <p role="alert" style="color: var(--pico-del-color);" x-text="error"></p>
          </template>
          <label>
            Username
            <input type="text" x-model="username" required autofocus>
          </label>
          <label>
            Password
            <input type="password" x-model="password" required>
          </label>
          <button type="submit" :aria-busy="loading">Login</button>
        </form>
      </article>
    </template>

    <!-- Dashboard -->
    <template x-if="authenticated">
      <div>
        <nav>
          <ul><li><strong>P2Poolv2 Dashboard</strong></li></ul>
          <ul><li><button class="outline secondary" @click="logout">Logout</button></li></ul>
        </nav>

        <article>
          <header>
            <h3>Chain Info</h3>
          </header>

          <template x-if="chainError">
            <p role="alert" style="color: var(--pico-del-color);" x-text="chainError"></p>
          </template>

          <template x-if="chainInfo">
            <div class="overflow-auto">
              <table>
                <tbody>
                  <tr>
                    <th scope="row">Genesis Blockhash</th>
                    <td><code x-text="chainInfo.genesis_blockhash || 'N/A'"></code></td>
                  </tr>
                  <tr>
                    <th scope="row">Chain Tip Height</th>
                    <td x-text="chainInfo.chain_tip_height != null ? chainInfo.chain_tip_height : 'N/A'"></td>
                  </tr>
                  <tr>
                    <th scope="row">Total Work</th>
                    <td><code x-text="chainInfo.total_work || 'N/A'"></code></td>
                  </tr>
                  <tr>
                    <th scope="row">Chain Tip Blockhash</th>
                    <td><code x-text="chainInfo.chain_tip_blockhash || 'N/A'"></code></td>
                  </tr>
                </tbody>
              </table>
            </div>
          </template>
        </article>

        <article>
          <header>
            <h3>Shares</h3>
          </header>

          <template x-if="sharesError">
            <p role="alert" style="color: var(--pico-del-color);" x-text="sharesError"></p>
          </template>

          <template x-if="shares.length > 0">
            <div class="overflow-auto">
              <table>
                <thead>
                  <tr>
                    <th>Height</th>
                    <th>Blockhash</th>
                    <th>Miner</th>
                    <th>Time</th>
                    <th>Uncles</th>
                  </tr>
                </thead>
                <tbody>
                  <template x-for="share in pagedShares" :key="share.blockhash">
                    <tr>
                      <td x-text="share.height"></td>
                      <td><code x-text="formatHash(share.blockhash)"></code></td>
                      <td><code x-text="formatHash(share.miner_pubkey)"></code></td>
                      <td x-text="formatTimestamp(share.timestamp)"></td>
                      <td x-text="share.uncles.length"></td>
                    </tr>
                  </template>
                </tbody>
              </table>
              <nav>
                <ul>
                  <li><button class="outline" @click="previousSharesPage" :disabled="sharesPage === 0">Previous</button></li>
                </ul>
                <ul>
                  <li><span x-text="(sharesPage + 1) + ' / ' + totalSharesPages"></span></li>
                </ul>
                <ul>
                  <li><button class="outline" @click="nextSharesPage" :disabled="sharesPage >= totalSharesPages - 1">Next</button></li>
                </ul>
              </nav>
            </div>
          </template>

          <template x-if="shares.length === 0 && !sharesError">
            <p>No shares found.</p>
          </template>
        </article>
      </div>
    </template>

  </main>

  <script src="/static/dashboard.js"></script>
</body>
</html>
