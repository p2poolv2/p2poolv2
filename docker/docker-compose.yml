name: p2poolv2

services:
  bitcoind:
    build:
      context: bitcoind
    volumes:
      - bitcoin_data:/data
    ports:
      - "${BTC_P2P_PORT:-38333}:${BTC_P2P_PORT:-38333}" # P2P port
      - "${BTC_RPC_PORT:-38332}:${BTC_RPC_PORT:-38332}" # RPC port
      - "28332:28332" # ZMQ port is always the same
    environment:
      - NETWORK=${NETWORK:-signet}
    command: -conf=/etc/bitcoin/bitcoin-${NETWORK:-signet}.conf -datadir=/data
    restart: unless-stopped
    networks:
      - p2poolv2_network
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

  bitcoin-bootstrap:
    build:
      context: bitcoind
    depends_on:
      bitcoind:
        condition: service_started
    entrypoint: ["/usr/local/bin/bootstrap.sh"]
    environment:
      - NETWORK=${NETWORK:-signet}
      - TARGET_HEIGHT=32
    healthcheck:
      disable: true
    restart: "no"
    networks:
      - p2poolv2_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "1"

  mujina_minerd:
    profiles: [developer]
    # you can change this to have multiple containers
    scale: ${MUJINA_SCALE:-1}
    image: ghcr.io/256foundation/mujina-minerd:main
    depends_on:
      p2poolv2:
        condition: service_healthy
    restart: unless-stopped
    env_file: .env
    environment:
      - RUST_LOG=${MUJINA_RUST_LOG:-trace}
    networks:
      - p2poolv2_network
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

  p2poolv2:
    build:
      context: ..
      dockerfile: docker/p2poolv2/Dockerfile
    depends_on:
      bitcoind:
        condition: service_healthy
    env_file: .env
    environment:
      - P2POOL_BITCOIN_NETWORK=${NETWORK:-signet}
      - P2POOL_BITCOIN_URL=bitcoind:${BTC_RPC_PORT:-38332}
      - P2POOL_STORE_PATH=/p2poolv2/data/${NETWORK:-signet}
      - P2POOL_CONFIG=/p2poolv2/config/config.toml
    volumes:
      - p2poolv2_data:/p2poolv2
      - ../config-dev.toml:/p2poolv2/config/config.toml:ro
    restart: unless-stopped
    networks:
      - p2poolv2_network
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

volumes:
  bitcoin_data:
  p2poolv2_data:

networks:
  p2poolv2_network:
    driver: bridge
