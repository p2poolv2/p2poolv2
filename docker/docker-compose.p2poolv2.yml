# Base p2poolv2 service definition, extended by docker-compose.yml and
# docker-compose.node.yml.  Do not run this file directly.

services:
  p2poolv2:
    image: p2poolv2:latest
    build:
      context: ..
      dockerfile: docker/p2poolv2/Dockerfile
    env_file: .env
    environment:
      - P2POOL_BITCOIN_NETWORK=${NETWORK:-signet}
      - P2POOL_BITCOIN_URL=bitcoind:${BTC_RPC_PORT:-38332}
      - P2POOL_STORE_PATH=/p2poolv2/data/${NETWORK:-signet}
      - P2POOL_CONFIG=/etc/p2poolv2/config.toml
      - P2POOL_STRATUM_PORT=${P2POOL_STRATUM_PORT:-3333}
      - P2POOL_API_PORT=${P2POOL_API_PORT:-46884}
      - P2POOL_NETWORK_LISTEN_ADDRESS=/ip4/${P2POOL_P2P_HOST:-0.0.0.0}/tcp/${P2POOL_P2P_PORT:-6884}
    ports:
      - "${P2POOL_STRATUM_PORT:-3333}:${P2POOL_STRATUM_PORT:-3333}"
      - "${P2POOL_API_PORT:-46884}:${P2POOL_API_PORT:-46884}"
      - "${P2POOL_P2P_PORT:-6884}:${P2POOL_P2P_PORT:-6884}"
    volumes:
      - p2poolv2_data:/p2poolv2
      - ../${P2POOL_CONFIG:-config.toml}:/etc/p2poolv2/config.toml:ro
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

  mujina_minerd:
    profiles: [developer]
    scale: ${MUJINA_SCALE:-1}
    image: ghcr.io/256foundation/mujina-minerd:main
    depends_on:
      p2poolv2:
        condition: service_healthy
    restart: unless-stopped
    env_file: .env
    environment:
      - RUST_LOG=${MUJINA_RUST_LOG:-trace}
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

volumes:
  p2poolv2_data:
